<div class ="row">
    <div class="col-md-6">
        <!--linke Spalte-->
        <f:for each="{columnleft}" as = "child">
            <f:cObject typoscriptObjectPath = "tt_content" data = "{child.data}" />

    <div class="col-md-6">
        <!--rechte Spalte-->

        </f:for>
    </div>
</div>
